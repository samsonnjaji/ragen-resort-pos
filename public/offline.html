<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#059669" />
  <title>Offline — RAGEN RESORT POS</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #022c22; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .card { max-width: 400px; border: 1px solid rgba(212,175,55,.3); border-radius: 16px; padding: 32px; background: #064e3b; }
    h1 { color: #D4AF37; font-size: 1.5rem; margin: 0 0 12px; }
    p { color: rgba(255,255,255,.8); line-height: 1.5; margin: 0 0 20px; }
    button { background: #D4AF37; color: #022c22; border: 0; padding: 14px 24px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Server Not Reachable</h1>
    <p>RAGEN RESORT POS cannot connect to the local server. Check Wi-Fi and ensure the main laptop/server is running.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
